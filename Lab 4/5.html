<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      let a = parseInt(prompt("Enter two digit number"));
      let l=a%10
      let f=parseInt(a/10)
      let i,ans=1

      for(i=1;i<=l;i++){
        ans=ans*f
      }
      document.write("ans="+ans)
      
    </script>

</body>
</html>
