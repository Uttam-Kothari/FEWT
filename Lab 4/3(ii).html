<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      let n = parseInt(prompt("Enter number of line"));
      let i,j
      for(i=n;i>0;i--){
        for(j=i;j>0;j--){
            document.write(j+" ")
        }
        document.write("</br>")
      }
    </script>
</body>
</html>
