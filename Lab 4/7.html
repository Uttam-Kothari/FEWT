<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let s = prompt("enter string");
      let x = prompt("enter charcter");
      let f = s.indexOf(x);
      let l = s.lastIndexOf(x);
      let str = s.substring(f + 1, l);
      document.write(str);
    </script>
  </body>
