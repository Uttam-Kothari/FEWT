<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let today = new Date();
        document.write("<br>Current date and time: " + today);

        document.write("<br>Current time: " +today.getHours() +":" +today.getMinutes() +":" +today.getSeconds(),);

        let days = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];
        document.write("<br>Current day: " + days[today.getDay()]);

        let Month = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        document.write("<br>current Month: " + Month[today.getMonth()]);

        document.write("<br>current year: " + today.getFullYear());
    </script>
</body>
</html>
