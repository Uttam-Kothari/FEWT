<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
        let a = Math.floor(7.8);
        document.write("<br>Floor value: " + a);

        let b = Math.ceil(7.2);
        document.write("<br>Ceil value: " + b);

        let c = Math.round(7.5);
        document.write("<br>Round value: " + c);

        let d = Math.trunc(7.9);
        document.write("<br>Truncate value: " + d);
    </script>
</body>
</html>
