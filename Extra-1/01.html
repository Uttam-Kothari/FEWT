<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let a = Math.max(1, 2, 3, 4, 5);
      document.write("Maximum value: " + a);

      let b = Math.min(1, 2, 3, 4, 5);
      document.write("<br>Minimum value: " + b);

      let c = Math.abs(-10);
      document.write("<br>Absolute value: " + c);
    </script>
  </body>
</html>
