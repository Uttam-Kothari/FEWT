<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .box {
        width: 420px;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #0d6efd;
      }

      #result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        color: green;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Building Height Calculator</h2>

      <label class="form-label">Distance from Building (meters)</label>
      <input type="number" id="distance" class="form-control" />

      <br />

      <label class="form-label">Angle of Elevation (degrees)</label>
      <input type="number" id="angle" class="form-control" />

      <br />

      <button class="btn btn-primary w-100" onclick="calculateHeight()">
        Calculate Height
      </button>

      <div id="result"></div>
    </div>

    <script>
      function calculateHeight() {
        let distance = parseFloat(document.getElementById("distance").value);
        let angle = parseFloat(document.getElementById("angle").value);

        if (isNaN(distance) || isNaN(angle)) {
          alert("Please enter valid values.");
          return;
        }

        let radian = (angle * Math.PI) / 180;

        let height = distance * Math.tan(radian);

        document.getElementById("result").innerHTML =
          "Height of Building = " + height.toFixed(2) + " meters";
      }
    </script>
  </body>
</html>
