<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beautiful Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
      }

      .calculator {
        width: 380px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      h2 {
        color: white;
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
      }

      #mytext {
        width: 100%;
        height: 70px;
        border-radius: 15px;
        border: none;
        outline: none;
        text-align: right;
        font-size: 35px;
        padding-right: 15px;
        margin-bottom: 15px;
        background: #fff;
        color: #000;
        box-shadow: inset 0 0 8px gray;
      }

      .btn-calc {
        width: 100%;
        height: 65px;
        font-size: 22px;
        font-weight: bold;
        border-radius: 15px;
        transition: 0.3s;
        border: none;
      }

      .btn-calc:hover {
        transform: scale(1.08);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      }

      .number {
        background: #f8f9fa;
        color: #000;
      }

      .number:hover {
        background: #dee2e6;
      }

      .operator {
        background: #0d6efd;
        color: white;
      }

      .operator:hover {
        background: #0b5ed7;
      }

      .equal {
        background: #198754;
        color: white;
      }

      .equal:hover {
        background: #157347;
      }

      .clear {
        background: #dc3545;
        color: white;
      }

      .clear:hover {
        background: #bb2d3b;
      }

      .delete {
        background: #fd7e14;
        color: white;
      }

      .delete:hover {
        background: #e96b02;
      }

      td {
        padding: 6px;
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <h2>Calculator</h2>

      <table class="table-borderless w-100">
        <tr>
          <td colspan="4">
            <input type="text" id="mytext" readonly />
          </td>
        </tr>

        <tr>
          <td>
            <button class="btn-calc clear" onclick="delectall()">AC</button>
          </td>
          <td>
            <button class="btn-calc delete" onclick="delectlast()">DEL</button>
          </td>
          <td>
            <button class="btn-calc operator" onclick="display('%')">%</button>
          </td>
          <td>
            <button class="btn-calc operator" onclick="display('/')">÷</button>
          </td>
        </tr>

        <tr>
          <td>
            <button class="btn-calc number" onclick="display('7')">7</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('8')">8</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('9')">9</button>
          </td>
          <td>
            <button class="btn-calc operator" onclick="display('*')">×</button>
          </td>
        </tr>

        <tr>
          <td>
            <button class="btn-calc number" onclick="display('4')">4</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('5')">5</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('6')">6</button>
          </td>
          <td>
            <button class="btn-calc operator" onclick="display('-')">−</button>
          </td>
        </tr>

        <tr>
          <td>
            <button class="btn-calc number" onclick="display('1')">1</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('2')">2</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('3')">3</button>
          </td>
          <td>
            <button class="btn-calc operator" onclick="display('+')">+</button>
          </td>
        </tr>

        <tr>
          <td>
            <button class="btn-calc number" onclick="display('0')">0</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('00')">00</button>
          </td>
          <td>
            <button class="btn-calc number" onclick="display('.')">.</button>
          </td>
          <td><button class="btn-calc equal" onclick="ans()">=</button></td>
        </tr>
      </table>
    </div>

    <script>
      function delectall() {
        document.getElementById("mytext").value = "";
      }

      function display(op) {
        document.getElementById("mytext").value += op;
      }

      function delectlast() {
        let value = document.getElementById("mytext").value;
        document.getElementById("mytext").value = value.slice(0, -1);
      }

      function ans() {
        try {
          let value = document.getElementById("mytext").value;
          document.getElementById("mytext").value = eval(value);
        } catch {
          document.getElementById("mytext").value = "Error";
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
