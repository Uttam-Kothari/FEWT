<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <style>
            button {
                width: 100%;
                height: 100%;
                font-size: 20px;
                background-color:darkblue;
                color: white;
                border-radius: 15px;
            }

            table {
                width: 400px;
                height: 400px;
                margin-left: auto;
                margin-right: auto;
                margin-top: 200px;
                background-color: lightblue;
                border-radius: 15px;
                
            }

            input{
                width: 100%;
                height: 100%;
                font-size: 45px;
                color: rgb(241, 30, 30);
                border-radius: 15px;
                background-color: lightblue;
                border: 5px solid darkblue;
            }

        </style>

</head>

<body>
    <table class="">
        <tr>
            <td colspan="4"><input type="text" id="mytext"></td>
        </tr>

        <tr>
            <td><button onclick="delectall()">AC</button></td>
            <td><button onclick="delectlast()">del</button></td>
            <td><button onclick="display('%')">%</button></td>
            <td><button onclick="display('/')">/</button></td>
        </tr>

        <tr>
            <td><button onclick="display('7')">7</button></td>
            <td><button onclick="display('8')">8</button></td>
            <td><button onclick="display('9')">9</button></td>
            <td><button onclick="display('*')">*</button></td>
        </tr>

        <tr>
            <td><button onclick="display('4')">4</button></td>
            <td><button onclick="display('5')">5</button></td>
            <td><button onclick="display('6')">6</button></td>
            <td><button onclick="display('-')">-</button></td>
        </tr>

        <tr>
            <td><button onclick="display('1')">1</button></td>
            <td><button onclick="display('2')">2</button></td>
            <td><button onclick="display('3')">3</button></td>
            <td><button onclick="display('+')">+</button></td>
        </tr>


        <tr>
            <td><button onclick="display('0')">0</button></td>
            <td><button onclick="display('00')">00</button></td>
            <td><button onclick="display('.')">.</button></td>
            <td><button onclick="ans()">=</button></td>

        </tr>



    </table>

    <script>
        function delectall() {
            document.getElementById("mytext").value = "";
        }

        function display(op) {
            op = document.getElementById("mytext").value += op;
        }
        function delectlast() {
            var value = document.getElementById("mytext").value;
            document.getElementById("mytext").value = value.slice(0, - 1);
        }

        function ans() {
            var value = document.getElementById("mytext").value;
            document.getElementById("mytext").value = eval(value);
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
