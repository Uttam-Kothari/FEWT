<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let A=parseInt(prompt("entetr A: "))
        let a=0
        let b=1
        let c=0
        for (let i = 0; i < A; i++) {   
            document.write(a+" ")
            c=a+b
            a=b
            b=c
        }   

    </script>
</body>
</html>
