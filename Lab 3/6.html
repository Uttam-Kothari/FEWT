<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let A=parseInt(prompt("entetr a: "))
        let temp=A
        let sum=0
        let n=0
        while(A>0){
            n++
            A=parseInt(A/10)
        }
        temp=A
        for(let i=0;i<n;i++){
            sum=sum+Math.pow(temp%10,n)
            temp=parseInt(temp/10)
        }
        if(sum==A){
            document.write("armstrong")
        }
        else{
            document.write("not armstrong")
        }
        
    </script>
</body>
</html>
